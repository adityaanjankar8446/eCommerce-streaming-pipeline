
services:

  # ─── Zookeeper ───────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  # ─── Kafka Broker ────────────────────────────────────
  broker:
    image: confluentinc/cp-kafka:7.5.0
    container_name: broker
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"

  # ─── Kafka UI ─────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - broker
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:9092

  # ─── Spark Master ─────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master
    ports:
      - "8080:8080"   # Spark UI
      - "7077:7077"   # Spark master
    volumes:
      - ./scripts:/opt/scripts
      - ./data:/opt/data
      - ./checkpoints:/opt/checkpoints

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    volumes:
      - ./scripts:/opt/scripts
      - ./data:/opt/data
      - ./checkpoints:/opt/checkpoints

  # ─── Airflow ──────────────────────────────────────────
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"    # ← 5433 to avoid conflict with your existing postgres on 5432
    volumes:
      - postgres-airflow:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.7.2
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    volumes:
      - ./dags:/opt/airflow/dags
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com"

  airflow-scheduler:
  image: apache/airflow:2.7.2
  container_name: airflow-scheduler
  depends_on:
    - airflow-init
    - postgres
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - _PIP_ADDITIONAL_REQUIREMENTS=pyspark==3.5.3 delta-spark==3.1.0  # ← add this
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/scripts
    - ./data:/opt/data
    - ./checkpoints:/opt/checkpoints
  command: scheduler

airflow-webserver:
  image: apache/airflow:2.7.2
  container_name: airflow-webserver
  depends_on:
    - airflow-init
    - postgres
  ports:
    - "8081:8080"
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - _PIP_ADDITIONAL_REQUIREMENTS=pyspark==3.5.3 delta-spark==3.1.0  # ← add this
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/scripts
    - ./data:/opt/data
    - ./checkpoints:/opt/checkpoints
  command: webserver

volumes:
  postgres-airflow: